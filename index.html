<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Temas IB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <div id="theme-badge" class="badge">IB Spanish Ab Initio</div>

        <div class="main-card">
            <h1 id="question-text">¿Qué vas a practicar hoy?</h1>
            <p id="grammar-tip">Selecciona un tema y pulsa el botón para empezar.</p>
        </div>

        <div class="controls-panel">
            <div class="select-container">
                <label for="topic-select">Tema de examen:</label>
                <select id="topic-select">
                    <option value="Todos">Todos los temas</option>
                    <option value="Identidades">Identidades</option>
                    <option value="Experiencias">Experiencias</option>
                    <option value="Ingenio Humano">Ingenio Humano</option>
                    <option value="Organización Social">Organización Social</option>
                    <option value="Compartir el Planeta">Compartir el Planeta</option>
                </select>
            </div>
            
            <button id="generate-btn">Generar nuevo tema</button>
        </div>

        <footer class="site-footer">
            Herramienta de práctica para Evaluación Oral Individual
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
